<html lang="es">
<head>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--ac:#BA7517;--al:#FAEEDA;--ad:#633806;--bg:#f8f6f2;--card:#ffffff;--border:#e8e0d4;--text:#1a1410;--muted:#8a7d6a;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;padding-bottom:80px;max-width:480px;margin:0 auto;}
.hdr{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px 10px;position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:8px;}
.hdr-back{background:none;border:none;font-size:22px;color:var(--ac);cursor:pointer;padding:0 8px 0 0;line-height:1;}
.hdr-title{font-size:17px;font-weight:600;}
.hdr-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.sync-dot{margin-left:auto;font-size:13px;cursor:default;transition:color .3s;}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;}
.nav-btn{flex:1;padding:9px 2px 7px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;color:var(--muted);font-family:inherit;}
.nav-btn.active{color:var(--ac);}
.nav-icon{font-size:18px;}
.sec{padding:12px 16px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px;}
.card.accent{border-left:3px solid var(--ac);}
.card.green{border-left:3px solid #639922;}
.card-row{display:flex;justify-content:space-between;align-items:center;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.stat{background:#f0ebe4;border-radius:8px;padding:10px 12px;text-align:center;}
.stat-val{font-size:22px;font-weight:600;display:block;}
.stat-lbl{font-size:11px;color:var(--muted);display:block;margin-top:2px;}
label.lbl{font-size:12px;color:var(--muted);display:block;margin-bottom:3px;font-weight:500;}
input,select,textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:14px;background:var(--card);color:var(--text);margin-bottom:10px;}
input:focus,select:focus,textarea:focus{outline:2px solid var(--ac);border-color:var(--ac);}

.btn{width:100%;padding:11px;background:var(--ac);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;font-family:inherit;}
.btn:hover{background:#9a5f10;}
.btn-s{width:100%;padding:11px;background:#f0ebe4;border:1px solid var(--border);border-radius:8px;font-size:14px;cursor:pointer;margin-top:6px;color:var(--text);font-family:inherit;}
.btn-s:hover{background:#e8e0d4;}
.btn-x{padding:8px 14px;background:#f0ebe4;border:1px solid var(--border);border-radius:8px;font-size:12px;cursor:pointer;color:var(--text);font-family:inherit;}
.btn-green{padding:8px 14px;background:#EAF3DE;border:1px solid #97C459;border-radius:8px;font-size:12px;cursor:pointer;color:#27500A;font-family:inherit;}
.btn-danger{padding:8px 14px;background:#FCEBEB;border:1px solid #F09595;border-radius:8px;font-size:12px;cursor:pointer;color:#A32D2D;font-family:inherit;}
.btn-full{flex:1;}
.bdg{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;}
.bdg-amber{background:var(--al);color:var(--ad);}
.bdg-green{background:#EAF3DE;color:#27500A;}
.bdg-red{background:#FCEBEB;color:#A32D2D;}
.bdg-gray{background:#F1EFE8;color:#5F5E5A;}
.tr{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border);}
.tr span:first-child{font-size:12px;color:var(--muted);}
.tr span:last-child{font-size:13px;font-weight:500;}
h2{font-size:15px;font-weight:600;margin:0 0 10px;}
h3{font-size:13px;font-weight:600;margin:10px 0 6px;color:var(--text);}
.muted{font-size:12px;color:var(--muted);}
.divider{border-top:1px solid var(--border);margin:10px 0;}
.chip{padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:#f0ebe4;color:var(--text);font-family:inherit;}
.chip.on{background:var(--al);color:var(--ad);border-color:var(--ac);}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.frac-cabezas{background:#FCEBEB;color:#A32D2D;}
.frac-corazones{background:#EAF3DE;color:#27500A;}
.frac-colas{background:var(--al);color:var(--ad);}
.btn-row{display:flex;gap:8px;margin-top:4px;}
.hidden{display:none!important;}
.sub-card{background:#f8f6f2;border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px;}
.sub-card h3{color:var(--ac);}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:12px;color:var(--muted);}
.loading-spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>

<body>

<div id="app"><div id="loading"><div class="loading-spinner"></div><span>Conectando con Firebase...</span></div></div>

<script>
// ─── FIREBASE INIT ─────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyCuv6dMEP65tChp_AFPLc-RNK3D7m78bzw",
  authDomain: "destileria-cascajal-resplandor.firebaseapp.com",
  projectId: "destileria-cascajal-resplandor",
  storageBucket: "destileria-cascajal-resplandor.firebasestorage.app",
  messagingSenderId: "319169434276",

};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

// ─── SYNC ──────────────────────────────────────────────────────────────────────
var syncStatus = 'ok';
function setSyncStatus(s){
  syncStatus = s;
  var dot = document.getElementById('sync-dot');
  if(!dot) return;
  if(s==='saving'){ dot.textContent='⟳'; dot.style.color='#BA7517'; dot.title='Guardando...'; }
  else if(s==='error'){ dot.textContent='⚠'; dot.style.color='#A32D2D'; dot.title='Error al guardar'; }
  else { dot.textContent='●'; dot.style.color='#639922'; dot.title='Sincronizado con Firebase'; }
}

function syncCollection(colName, oldArr, newArr){
  setSyncStatus('saving');
  var newIds = new Set(newArr.map(function(x){ return x.id; }));
  var promises = [];
  oldArr.forEach(function(x){
    if(!newIds.has(x.id)) promises.push(db.collection(colName).doc(x.id).delete());
  });
  newArr.forEach(function(x){
    promises.push(db.collection(colName).doc(x.id).set(x));
  });
  if(promises.length === 0){ setSyncStatus('ok'); return; }
  Promise.all(promises)
    .then(function(){ setSyncStatus('ok'); })
    .catch(function(err){ console.error(err); setSyncStatus('error'); });
}

async function loadAll(){
  var results = await Promise.all([
    db.collection('fermentaciones').get(),
    db.collection('destilaciones').get(),
    db.collection('saneamientos').get()
  ]);
  state.F = results[0].docs.map(function(d){ return d.data(); }).sort(function(a,b){ return (parseInt(b.numero)||0)-(parseInt(a.numero)||0); });
  state.D = results[1].docs.map(function(d){ return d.data(); }).sort(function(a,b){ return (parseInt(b.numero)||0)-(parseInt(a.numero)||0); });
  state.S = results[2].docs.map(function(d){ return d.data(); }).sort(function(a,b){ return b.fecha>a.fecha?1:-1; });
}

// ─── STATE & HELPERS ───────────────────────────────────────────────────────────
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
const today = () => new Date().toISOString().slice(0,10);
const todayFile = () => { var d=new Date(); return ('0'+d.getDate()).slice(-2)+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+d.getFullYear(); };
const nowT = () => new Date().toTimeString().slice(0,5);
const fmtDate = d => d ? new Date(d+'T12:00').toLocaleDateString('es-CO',{day:'2-digit',month:'2-digit',year:'numeric'}) : '—';

var state = {
  tab: 'dashboard',
  view: 'list',
  sel: null,
  F: [],
  D: [],
  S: [],
};

function saveF(data){ syncCollection('fermentaciones', state.F, data); state.F=data; }
function saveD(data){ syncCollection('destilaciones', state.D, data); state.D=data; }
function saveS(data){ syncCollection('saneamientos', state.S, data); state.S=data; }

function go(tab,view,sel){
  state.tab=tab||state.tab;
  state.view=view||'list';
  state.sel=sel||null;
  render();
}

// ─── PDF ──────────────────────────────────────────────────────────────────────
function tr(l,v){ return '<tr><td>'+l+'</td><td>'+v+'</td></tr>'; }

function openPDF(title, body){
  var css = 'body{font-family:Arial,sans-serif;font-size:11px;color:#111;max-width:720px;margin:0 auto;padding:20px}'
    +'h1{font-size:16px;border-bottom:2px solid #BA7517;padding-bottom:8px;margin-bottom:12px}'
    +'h2{font-size:13px;color:#BA7517;margin:14px 0 5px;border-bottom:1px solid #eee;padding-bottom:3px}'
    +'table{width:100%;border-collapse:collapse;margin:4px 0}'
    +'td{padding:4px 8px;border-bottom:1px solid #f0f0f0;vertical-align:top}'
    +'td:first-child{color:#666;width:40%;font-weight:500}'
    +'th{background:#f5f0e8;padding:5px 8px;text-align:left;font-size:10px;color:#555}'
    +'@media print{.noprint{display:none}}';
  var hdr = '<div style="display:flex;justify-content:space-between;margin-bottom:14px">'
    +'<div><div style="font-size:10px;color:#BA7517;font-weight:600;letter-spacing:.1em">DESTILERÍA ARTESANAL · RON DE PANELA</div>'
    +'<div style="font-size:10px;color:#888">Subachoque, Cundinamarca · BPM INVIMA</div></div>'
    +'<div style="text-align:right;font-size:10px;color:#888">Generado: '+new Date().toLocaleString('es-CO')+'</div></div>';
  var ftr = '<div style="margin-top:24px;border-top:1px solid #eee;padding-top:10px;font-size:10px;color:#888">'
    +'Documento para archivo y presentación INVIMA.<br><br>'
    +'Firma responsable: ___________________________ &nbsp;&nbsp; Fecha: _______________</div>'
    +'<button class="noprint" onclick="window.print()" style="margin-top:16px;padding:8px 20px;background:#BA7517;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px">Imprimir / Guardar PDF</button>';
  var w = window.open('','_blank');
  w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+title+'</title><style>'+css+'</style></head><body>'+hdr+body+ftr+'</body></html>');
  w.document.close();
}

function pdfFerm(f){
  var segs = '';
  if(f.seguimiento && f.seguimiento.length){
    segs = '<h2>Seguimiento</h2><table><tr><th>Fecha/Hora</th><th>Densidad</th><th>Brix</th><th>Observacion</th></tr>';
    f.seguimiento.forEach(function(sg){ segs+='<tr><td>'+sg.fecha+' '+sg.hora+'</td><td>'+(sg.densidad||'—')+'</td><td>'+(sg.brix||'—')+'</td><td>'+(sg.observacion||'')+'</td></tr>'; });
    segs+='</table>';
  }
  var body = '<h1>Fermentación #'+f.numero+'</h1>'
    +'<h2>Datos generales</h2><table>'+tr('Fecha inicio',fmtDate(f.fechaInicio))+(f.fechaFin?tr('Fecha fin fermentación',fmtDate(f.fechaFin)):'')+( f.fechaTraslado?tr('Traslado al destilador',fmtDate(f.fechaTraslado)):'' )+( f.duracionDias?tr('Duración',f.duracionDias+' días'):'' )+'</table>'
    +'<h2>Materia prima</h2><table>'+tr('Panela',(f.panela_kg||'—')+' kg')+tr('Agua',(f.volumenAgua||'—')+' litros')+tr('Levadura',(f.levadura_g||'—')+' g · '+(f.levadura_tipo||''))+tr('Fosfato diamonio',(f.fosfatoDiamonio_g||'—')+' g')+tr('Sulfato magnesio',(f.sulfatoMagnesio_g||'—')+' g')+tr('Sulfato calcio',(f.sulfatoCalcio_g||'—')+' g')+tr('Ácido cítrico',(f.acidoCitrico_g||'—')+' g')+'</table>'
    +'<h2>Cocción</h2><table>'+tr('Hora inicio cocción',f.horaInicioCoccion||'—')+tr('Hora inicio hervor',f.horaHervor||'—')+tr('Duración hervor',(f.duracionHervor_min||'—')+' min')+'</table>'
    +'<h2>Parámetros iniciales</h2><table>'+tr('Brix inicial',f.brixInicial||'—')+tr('Densidad inicial',f.densidadInicial||'—')+tr('pH inicial',f.phInicial||'—')+tr('pH ajustado',f.phAjustado||'—')+tr('Temp. inoculación',(f.tempInoculacion||'—')+' °C')+'</table>'
    +segs
    +(f.densidadFinal?'<h2>Cierre</h2><table>'+tr('Densidad final',f.densidadFinal)+tr('Brix final',f.brixFinal||'—')+'</table>':'')
    +(f.observaciones?'<h2>Observaciones</h2><p>'+f.observaciones+'</p>':'');
  openPDF('Fermentación #'+f.numero, body);
}

function pdfDest(d){
  var tlp = {cabezas:'Cabezas',corazones:'Corazones',colas:'Colas'};
  var fracs = d.fracciones||[];
  var cab = fracs.filter(function(f){return f.tipo==='cabezas';}).reduce(function(a,f){return a+(parseFloat(f.volumen_ml)||0);},0);
  var cor = fracs.filter(function(f){return f.tipo==='corazones';}).reduce(function(a,f){return a+(parseFloat(f.volumen_ml)||0);},0);
  var col = fracs.filter(function(f){return f.tipo==='colas';}).reduce(function(a,f){return a+(parseFloat(f.volumen_ml)||0);},0);
  var fracRows = '';
  if(fracs.length){
    fracRows='<h2>Fracciones recolectadas</h2><table><tr><th>Hora</th><th>Tipo</th><th>Volumen</th><th>ABV</th><th>T.Caldera</th><th>T.Refrig.</th><th>Notas organolepticas</th></tr>';
    fracs.forEach(function(fr){ fracRows+='<tr><td>'+fr.hora+'</td><td>'+(tlp[fr.tipo]||fr.tipo)+'</td><td>'+fr.volumen_ml+' mL</td><td>'+fr.abv+'%</td><td>'+(fr.tempCaldera||'—')+'°C</td><td>'+(fr.tempRefrigeracion||'—')+'°C</td><td>'+(fr.notas||'')+'</td></tr>'; });
    fracRows+='</table>';
  }
  var intRows = '';
  if((d.intervenciones||[]).length){
    intRows='<h2>Intervenciones</h2><table><tr><th>Hora</th><th>Descripción</th></tr>';
    d.intervenciones.forEach(function(iv){ intRows+='<tr><td>'+iv.hora+'</td><td>'+iv.descripcion+'</td></tr>'; });
    intRows+='</table>';
  }
  var body = '<h1>Destilación #'+d.numero+'</h1>'
    +'<h2>Datos generales</h2><table>'+tr('Fecha',fmtDate(d.fecha))+tr('Hora inicio',d.horaInicio||'—')+'</table>'
    +'<h2>Condiciones iniciales</h2><table>'+tr('Densidad mosto',d.densidadMostoInicial||'—')+tr('Temperatura caldera',(d.tempCaldera||'—')+' °C')+tr('Temperatura refrigeración',(d.tempRefrigeracion||'—')+' °C')+'</table>'
    +(d.insumosEspeciales?'<h2>Insumos especiales</h2><p>'+d.insumosEspeciales+'</p>':'')
    +'<h2>Resumen de producción</h2><table>'+tr('Cabezas',cab+' mL ('+( cab/1000).toFixed(3)+' L)')+tr('Corazones',cor+' mL ('+(cor/1000).toFixed(3)+' L)')+tr('Colas',col+' mL ('+(col/1000).toFixed(3)+' L)')+(d.eficiencia?tr('Eficiencia',d.eficiencia+'%'):'')+'</table>'
    +fracRows+intRows
    +(d.observaciones?'<h2>Observaciones</h2><p>'+d.observaciones+'</p>':'');
  openPDF('Destilación #'+d.numero, body);
}

function pdfSan(s){
  var tl={lavado:'Lavado',desinfeccion:'Desinfección',ambos:'Lavado + Desinfección'};
  var body = '<h1>Registro de Saneamiento · BPM INVIMA</h1>'
    +'<h2>Datos generales</h2><table>'+tr('Fecha',fmtDate(s.fecha))+tr('Hora',s.hora||'—')+tr('Tipo de operación',tl[s.tipo]||s.tipo)+tr('Equipos / Áreas',(s.equipos||[]).join(', ')||'—')+(s.responsable?tr('Responsable',s.responsable):'')+'</table>'
    +((s.tipo==='lavado'||s.tipo==='ambos')&&s.detergente?'<h2>Procedimiento de lavado</h2><table>'+tr('Detergente',s.detergente)+tr('Concentración',s.concentracionDetergente||'—')+tr('Volumen solución',(s.volumenDetergente||'—')+' mL')+'</table>':'')
    +((s.tipo==='desinfeccion'||s.tipo==='ambos')?'<h2>Procedimiento de desinfección</h2><table>'+tr('Desinfectante',s.desinfectante||'—')+tr('Dilución',s.concentracionDesinfectante||'—')+tr('Volumen solución',(s.volumenDesinfectante||'—')+' mL')+tr('Tiempo de contacto',(s.tiempoContacto_min||'—')+' min')+'</table>':'')
    +(s.observaciones?'<h2>Observaciones</h2><p>'+s.observaciones+'</p>':'');
  openPDF('Registro de Saneamiento', body);
}

// ─── EXCEL ────────────────────────────────────────────────────────────────────
function exportExcel(){
  if(!window.XLSX){ alert('Librería Excel cargando, intenta en unos segundos.'); return; }
  var wb = XLSX.utils.book_new();
  var fd = state.F.length ? state.F.map(function(f){ return {'N':f.numero,'Fecha inicio':fmtDate(f.fechaInicio),'Estado':f.estado,'Panela kg':f.panela_kg,'Agua L':f.volumenAgua,'Levadura g':f.levadura_g,'Tipo levadura':f.levadura_tipo,'Fosfato diamonio g':f.fosfatoDiamonio_g,'Sulfato magnesio g':f.sulfatoMagnesio_g,'Sulfato calcio g':f.sulfatoCalcio_g,'Acido citrico g':f.acidoCitrico_g,'Brix inicial':f.brixInicial,'Densidad inicial':f.densidadInicial,'pH inicial':f.phInicial,'pH ajustado':f.phAjustado,'Temp inoculacion C':f.tempInoculacion,'Fecha fin':fmtDate(f.fechaFin),'Densidad final':f.densidadFinal,'Brix final':f.brixFinal,'Duracion dias':f.duracionDias,'Observaciones':f.observaciones}; }) : [{}];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(fd), 'Fermentaciones');
  var dd = state.D.length ? state.D.map(function(d){ var fr=d.fracciones||[]; var cab=fr.filter(function(f){return f.tipo==='cabezas';}).reduce(function(a,f){return a+(parseFloat(f.volumen_ml)||0);},0); var cor=fr.filter(function(f){return f.tipo==='corazones';}).reduce(function(a,f){return a+(parseFloat(f.volumen_ml)||0);},0); var col=fr.filter(function(f){return f.tipo==='colas';}).reduce(function(a,f){return a+(parseFloat(f.volumen_ml)||0);},0); return {'N':d.numero,'Fecha':fmtDate(d.fecha),'Hora inicio':d.horaInicio,'Estado':d.estado,'Densidad mosto':d.densidadMostoInicial,'Temp caldera inicial':d.tempCaldera,'Temp refrig inicial':d.tempRefrigeracion,'Insumos especiales':d.insumosEspeciales,'Cabezas mL':cab,'Corazones mL':cor,'Colas mL':col,'Eficiencia pct':d.eficiencia,'Observaciones':d.observaciones}; }) : [{}];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(dd), 'Destilaciones');
  var sd = state.S.length ? state.S.map(function(s){ return {'Fecha':fmtDate(s.fecha),'Hora':s.hora,'Tipo':s.tipo,'Equipos':(s.equipos||[]).join(', '),'Detergente':s.detergente,'Concentracion detergente':s.concentracionDetergente,'Desinfectante':s.desinfectante,'Dilucion desinfectante':s.concentracionDesinfectante,'Tiempo contacto min':s.tiempoContacto_min,'Responsable':s.responsable,'Observaciones':s.observaciones}; }) : [{}];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(sd), 'Saneamiento');
  XLSX.writeFile(wb, 'destileria_registros_'+todayFile()+'.xlsx');
}

// ─── BACKUP ───────────────────────────────────────────────────────────────────
function exportBackup(){
  var data = JSON.stringify({fermentaciones:state.F,destilaciones:state.D,saneamientos:state.S,exportedAt:new Date().toISOString()},null,2);
  var blob = new Blob([data],{type:'application/json'});
  var a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='destileria_backup_'+todayFile()+'.json'; a.click();
}

function importBackup(e){
  var file = e.target.files[0]; if(!file) return;
  var r = new FileReader();
  r.onload = function(ev){
    try{
      var data = JSON.parse(ev.target.result);
      var msg = 'Importar: '+(data.fermentaciones||[]).length+' fermentaciones, '+(data.destilaciones||[]).length+' destilaciones, '+(data.saneamientos||[]).length+' saneamientos.\n¿Reemplazar datos actuales?';
      if(confirm(msg)){ saveF(data.fermentaciones||[]); saveD(data.destilaciones||[]); saveS(data.saneamientos||[]); go('dashboard'); }
    }catch(ex){ alert('Archivo inválido'); }
  };
  r.readAsText(file);
}

// ─── RENDER HELPERS ───────────────────────────────────────────────────────────
function h(tag, attrs, ...children){
  var el = document.createElement(tag);
  if(attrs) Object.keys(attrs).forEach(function(k){

  hdrText.appendChild(ht); hdrText.appendChild(hs); hdr.appendChild(hdrText);

  // Sync dot
  var dot=document.createElement('span'); dot.id='sync-dot'; dot.className='sync-dot';
  dot.textContent='●'; dot.style.color='#639922'; dot.title='Sincronizado con Firebase';
  hdr.appendChild(dot);
  app.appendChild(hdr);

  var views={
    'dashboard:list': renderDashboard,
    'fermentacion:list': renderFermList,
    'fermentacion:form': renderFermForm,
    'fermentacion:detail': renderFermDetail,
    'destilacion:list': renderDestList,
    'destilacion:form': renderDestForm,
    'destilacion:detail': renderDestDetail,
    'saneamiento:list': renderSanList,
    'saneamiento:form': renderSanForm,
    'saneamiento:detail': renderSanDetail,
    'datos:list': renderDatos,
  };
  var key = state.tab+':'+state.view;
  var viewFn = views[key];
  if(viewFn) app.appendChild(viewFn());

  var nav=document.createElement('nav'); nav.className='nav';
  [['dashboard','⌂','Inicio'],['fermentacion','⚗','Ferment.'],['destilacion','🏭','Destil.'],['saneamiento','✓','Saneam.'],['datos','☁','Datos']].forEach(function(t){
    var b=document.createElement('button'); b.className='nav-btn'+(state.tab===t[0]?' active':'');
    var ic=document.createElement('span'); ic.className='nav-icon'; ic.textContent=t[1];
    var lb=document.createElement('span'); lb.textContent=t[2];
    b.appendChild(ic); b.appendChild(lb);
    b.addEventListener('click',function(){state.tab=t[0];state.view='list';state.sel=null;render();});
    nav.appendChild(b);
  });
  app.appendChild(nav);
}

// ─── STARTUP ──────────────────────────────────────────────────────────────────
loadAll().then(function(){
  render();
}).catch(function(err){
  document.getElementById('app').innerHTML =
    '<div style="padding:24px;color:#A32D2D;text-align:center">'
    +'<p style="font-size:16px;font-weight:600;margin-bottom:8px">Error de conexión</p>'
    +'<p style="font-size:13px;color:#666">'+err.message+'</p>'
    +'<button onclick="location.reload()" style="margin-top:16px;padding:10px 20px;background:#BA7517;color:#fff;border:none;border-radius:8px;cursor:pointer">Reintentar</button>'
    +'</div>';
});
</script>
</body>
</html>
