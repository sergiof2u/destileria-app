<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Destilería · Ron de Panela</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--ac:#BA7517;--al:#FAEEDA;--ad:#633806;--bg:#f8f6f2;--card:#ffffff;--border:#e8e0d4;--text:#1a1410;--muted:#8a7d6a;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;padding-bottom:80px;max-width:480px;margin:0 auto;}
.hdr{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px 10px;position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:8px;}
.hdr-back{background:none;border:none;font-size:22px;color:var(--ac);cursor:pointer;padding:0 8px 0 0;line-height:1;}
.hdr-title{font-size:17px;font-weight:600;}
.hdr-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.sync-dot{margin-left:auto;font-size:13px;cursor:default;transition:color .3s;}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;}
.nav-btn{flex:1;padding:9px 2px 7px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;color:var(--muted);font-family:inherit;}
.nav-btn.active{color:var(--ac);}
.nav-icon{font-size:18px;}
.sec{padding:12px 16px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px;}
.card.accent{border-left:3px solid var(--ac);}
.card.green{border-left:3px solid #639922;}
.card-row{display:flex;justify-content:space-between;align-items:center;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.stat{background:#f0ebe4;border-radius:8px;padding:10px 12px;text-align:center;}
.stat-val{font-size:20px;font-weight:600;display:block;}
.stat-lbl{font-size:10px;color:var(--muted);display:block;margin-top:2px;}
label.lbl{font-size:12px;color:var(--muted);display:block;margin-bottom:3px;font-weight:500;}
input,select,textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:14px;background:var(--card);color:var(--text);margin-bottom:10px;}
input:focus,select:focus,textarea:focus{outline:2px solid var(--ac);border-color:var(--ac);}
textarea{resize:vertical;min-height:60px;}
.btn{width:100%;padding:11px;background:var(--ac);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;font-family:inherit;}
.btn:hover{background:#9a5f10;}
.btn-s{width:100%;padding:11px;background:#f0ebe4;border:1px solid var(--border);border-radius:8px;font-size:14px;cursor:pointer;margin-top:6px;color:var(--text);font-family:inherit;}
.btn-s:hover{background:#e8e0d4;}
.btn-x{padding:8px 14px;background:#f0ebe4;border:1px solid var(--border);border-radius:8px;font-size:12px;cursor:pointer;color:var(--text);font-family:inherit;}
.btn-green{padding:8px 14px;background:#EAF3DE;border:1px solid #97C459;border-radius:8px;font-size:12px;cursor:pointer;color:#27500A;font-family:inherit;}
.btn-danger{padding:8px 14px;background:#FCEBEB;border:1px solid #F09595;border-radius:8px;font-size:12px;cursor:pointer;color:#A32D2D;font-family:inherit;}
.btn-full{flex:1;}
.btn-mini{padding:3px 9px;border-radius:5px;font-size:11px;cursor:pointer;font-family:inherit;border:1px solid var(--border);line-height:1.6;}
.btn-mini-edit{background:#f0ebe4;color:var(--muted);}
.btn-mini-del{background:#FCEBEB;color:#A32D2D;border-color:#F09595;}
.bdg{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;}
.bdg-amber{background:var(--al);color:var(--ad);}
.bdg-green{background:#EAF3DE;color:#27500A;}
.bdg-red{background:#FCEBEB;color:#A32D2D;}
.bdg-gray{background:#F1EFE8;color:#5F5E5A;}
.bdg-purple{background:#F0EAFF;color:#5B2C8D;}
.tr{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border);}
.tr span:first-child{font-size:12px;color:var(--muted);}
.tr span:last-child{font-size:13px;font-weight:500;}
h2{font-size:15px;font-weight:600;margin:0 0 10px;}
h3{font-size:13px;font-weight:600;margin:10px 0 6px;color:var(--text);}
.muted{font-size:12px;color:var(--muted);}
.divider{border-top:1px solid var(--border);margin:10px 0;}
.chip{padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:#f0ebe4;color:var(--text);font-family:inherit;}
.chip.on{background:var(--al);color:var(--ad);border-color:var(--ac);}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.btn-row{display:flex;gap:8px;margin-top:4px;}
.sub-card{background:#f8f6f2;border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px;}
.sub-card h3{color:var(--ac);}
.temps-row{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin:5px 0;}
.temp-chip{background:#f0ebe4;border-radius:5px;padding:3px 7px;font-size:11px;color:var(--muted);}
.temp-chip span{font-weight:600;color:var(--text);}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:12px;color:var(--muted);}
.loading-spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app"><div id="loading"><div class="loading-spinner"></div><span>Conectando con Firebase...</span></div></div>
<script>
// ─── FIREBASE ─────────────────────────────────────────────────────────────────
const firebaseConfig={apiKey:"AIzaSyCuv6dMEP65tChp_AFPLc-RNK3D7m78bzw",authDomain:"destileria-cascajal-resplandor.firebaseapp.com",projectId:"destileria-cascajal-resplandor",storageBucket:"destileria-cascajal-resplandor.firebasestorage.app",messagingSenderId:"319169434276",appId:"1:319169434276:web:0413897a35d35059b74c31"};
firebase.initializeApp(firebaseConfig);
var db=firebase.firestore();

// ─── SYNC ─────────────────────────────────────────────────────────────────────
function setSyncStatus(s){var dot=document.getElementById('sync-dot');if(!dot)return;if(s==='saving'){dot.textContent='...';dot.style.color='#BA7517';dot.title='Guardando...';}else if(s==='error'){dot.textContent='!';dot.style.color='#A32D2D';dot.title='Error';}else{dot.textContent='●';dot.style.color='#639922';dot.title='Sincronizado';}}
function syncCollection(col,oldArr,newArr){setSyncStatus('saving');var newIds=new Set(newArr.map(function(x){return x.id;}));var p=[];oldArr.forEach(function(x){if(!newIds.has(x.id))p.push(db.collection(col).doc(x.id).delete());});newArr.forEach(function(x){p.push(db.collection(col).doc(x.id).set(x));});if(!p.length){setSyncStatus('ok');return;}Promise.all(p).then(function(){setSyncStatus('ok');}).catch(function(e){console.error(e);setSyncStatus('error');});}
async function loadAll(){var r=await Promise.all([db.collection('fermentaciones').get(),db.collection('destilaciones').get(),db.collection('saneamientos').get()]);state.F=r[0].docs.map(function(d){return d.data();}).sort(function(a,b){return(parseInt(b.numero)||0)-(parseInt(a.numero)||0);});state.D=r[1].docs.map(function(d){return d.data();}).sort(function(a,b){return(parseInt(b.numero)||0)-(parseInt(a.numero)||0);});state.S=r[2].docs.map(function(d){return d.data();}).sort(function(a,b){return b.fecha>a.fecha?1:-1;});}

// ─── UTILS ────────────────────────────────────────────────────────────────────
var uid=function(){return Date.now().toString(36)+Math.random().toString(36).slice(2);};
var today=function(){return new Date().toISOString().slice(0,10);};
var todayFile=function(){var d=new Date();return('0'+d.getDate()).slice(-2)+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+d.getFullYear();};
var nowT=function(){return new Date().toTimeString().slice(0,5);};
var fmtDate=function(d){return d?new Date(d+'T12:00').toLocaleDateString('es-CO',{day:'2-digit',month:'2-digit',year:'numeric'}):'—';};
var calcDias=function(a,b){if(!a||!b)return'';var r=Math.round((new Date(b+'T12:00')-new Date(a+'T12:00'))/(86400000));return r>0?r:'';};

var state={tab:'dashboard',view:'list',sel:null,F:[],D:[],S:[]};
function saveF(data){syncCollection('fermentaciones',state.F,data);state.F=data;}
function saveD(data){syncCollection('destilaciones',state.D,data);state.D=data;}
function saveS(data){syncCollection('saneamientos',state.S,data);state.S=data;}
function go(tab,view,sel){state.tab=tab||state.tab;state.view=view||'list';state.sel=sel||null;render();}

var TIPOS={metanol:'Metanol',cabezas:'Cabezas',corazones:'Corazones',colas:'Colas'};
var TCOLOR={metanol:'purple',cabezas:'red',corazones:'green',colas:'amber'};

// ─── DOM HELPERS ──────────────────────────────────────────────────────────────
function el(tag,cls,txt){var e=document.createElement(tag);if(cls)e.className=cls;if(txt!==undefined)e.textContent=txt;return e;}
function div(cls){var e=document.createElement('div');e.className=cls;return e;}
function p(cls,txt){var e=document.createElement('p');e.className=cls;e.textContent=txt;return e;}
function span(cls,txt){var e=document.createElement('span');e.className=cls;e.textContent=txt;return e;}
function strong(txt){var e=document.createElement('strong');e.textContent=txt;return e;}
function bdg(type,txt){return span('bdg bdg-'+type,txt);}
function trRow(label,val){var d=div('tr');d.appendChild(span('',label));d.appendChild(span('',val));return d;}
function btn(txt,cls,fn){var b=document.createElement('button');b.className=cls||'btn';b.textContent=txt;b.addEventListener('click',fn);return b;}
function minibtn(txt,type,fn){var b=document.createElement('button');b.className='btn-mini btn-mini-'+type;b.textContent=txt;b.addEventListener('click',fn);return b;}
function getVal(id){var e=document.getElementById(id);return e?e.value:'';}

function field(id,lbl,type,ph,val){
  var wrap=document.createElement('div');
  var label=document.createElement('label');label.className='lbl';label.textContent=lbl;
  var input;
  if(type==='textarea'){input=document.createElement('textarea');}
  else if(type==='select'){input=document.createElement('select');}
  else{input=document.createElement('input');input.type=type||'text';if(type==='decimal')input.inputMode='decimal';if(type==='numeric')input.inputMode='numeric';}
  input.id=id;input.style.cssText='width:100%;margin-bottom:10px;';
  if(ph)input.placeholder=ph;
  if(val!==undefined&&val!==null)input.value=val;
  wrap.appendChild(label);wrap.appendChild(input);
  return wrap;
}

function selField(id,lbl,options,defVal){
  var wrap=document.createElement('div');
  var label=document.createElement('label');label.className='lbl';label.textContent=lbl;
  var sel=document.createElement('select');sel.id=id;sel.style.cssText='width:100%;margin-bottom:10px;';
  options.forEach(function(it){var o=document.createElement('option');o.value=it[0];o.textContent=it[1];sel.appendChild(o);});
  if(defVal!==undefined)sel.value=defVal;
  wrap.appendChild(label);wrap.appendChild(sel);
  return wrap;
}

// ─── PDF ──────────────────────────────────────────────────────────────────────
function tr(l,v){return'<tr><td>'+l+'</td><td>'+v+'</td></tr>';}
function openPDF(title,body){var css='body{font-family:Arial,sans-serif;font-size:11px;color:#111;max-width:720px;margin:0 auto;padding:20px}h1{font-size:16px;border-bottom:2px solid #BA7517;padding-bottom:8px;margin-bottom:12px}h2{font-size:13px;color:#BA7517;margin:14px 0 5px;border-bottom:1px solid #eee;padding-bottom:3px}table{width:100%;border-collapse:collapse;margin:4px 0}td{padding:4px 8px;border-bottom:1px solid #f0f0f0;vertical-align:top}td:first-child{color:#666;width:38%;font-weight:500}th{background:#f5f0e8;padding:5px 8px;text-align:left;font-size:10px;color:#555}@media print{.noprint{display:none}}';var hdr='<div style="display:flex;justify-content:space-between;margin-bottom:14px"><div><div style="font-size:10px;color:#BA7517;font-weight:600">DESTILERIA ARTESANAL · RON DE PANELA</div><div style="font-size:10px;color:#888">Subachoque, Cundinamarca · BPM INVIMA</div></div><div style="text-align:right;font-size:10px;color:#888">'+new Date().toLocaleString('es-CO')+'</div></div>';var ftr='<div style="margin-top:24px;border-top:1px solid #eee;padding-top:10px;font-size:10px;color:#888">Documento para archivo INVIMA.<br><br>Firma: ___________________________ Fecha: _______________</div><button class="noprint" onclick="window.print()" style="margin-top:16px;padding:8px 20px;background:#BA7517;color:#fff;border:none;border-radius:4px;cursor:pointer">Imprimir / PDF</button>';var w=window.open('','_blank');w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+title+'</title><style>'+css+'</style></head><body>'+hdr+body+ftr+'</body></html>');w.document.close();}

function pdfFerm(f){var segs='';if((f.seguimiento||[]).length){segs='<h2>Seguimiento</h2><table><tr><th>Fecha/Hora</th><th>Densidad</th><th>Brix</th><th>Observacion</th></tr>';f.seguimiento.forEach(function(sg){segs+='<tr><td>'+sg.fecha+' '+sg.hora+'</td><td>'+(sg.densidad||'—')+'</td><td>'+(sg.brix||'—')+'</td><td>'+(sg.observacion||'')+'</td></tr>';});segs+='</table>';}var body='<h1>Fermentacion #'+f.numero+'</h1><h2>General</h2><table>'+tr('Fecha inicio',fmtDate(f.fechaInicio))+(f.fechaFin?tr('Fecha fin',fmtDate(f.fechaFin)):'')+( f.duracionDias?tr('Duracion',f.duracionDias+' dias'):'')+( f.fechaTraslado?tr('Traslado destilador',fmtDate(f.fechaTraslado)):'')+'</table><h2>Materia prima</h2><table>'+tr('Panela',(f.panela_kg||'—')+' kg')+tr('Agua',(f.volumenAgua||'—')+' L')+tr('Levadura',(f.levadura_g||'—')+' g - '+(f.levadura_tipo||''))+tr('Fosfato diamonio',(f.fosfatoDiamonio_g||'—')+' g')+tr('Sulfato magnesio',(f.sulfatoMagnesio_g||'—')+' g')+tr('Sulfato calcio',(f.sulfatoCalcio_g||'—')+' g')+tr('Acido citrico',(f.acidoCitrico_g||'—')+' g')+'</table><h2>Parametros</h2><table>'+tr('Brix inicial',f.brixInicial||'—')+tr('Densidad inicial',f.densidadInicial||'—')+tr('pH inicial',f.phInicial||'—')+tr('pH ajustado',f.phAjustado||'—')+tr('Temp inoculacion',(f.tempInoculacion||'—')+' C')+'</table>'+segs+(f.densidadFinal?'<h2>Cierre</h2><table>'+tr('Densidad final',f.densidadFinal)+tr('Brix final',f.brixFinal||'—')+'</table>':'')+(f.observaciones?'<h2>Observaciones</h2><p>'+f.observaciones+'</p>':'');openPDF('Fermentacion #'+f.numero,body);}

function pdfDest(d){var fracs=d.fracciones||[];var tots={};fracs.forEach(function(fr){tots[fr.tipo]=(tots[fr.tipo]||0)+(parseFloat(fr.volumen_ml)||0);});var fracRows='';if(fracs.length){fracRows='<h2>Cortes</h2><table><tr><th>Fecha</th><th>Hora</th><th>Tipo</th><th>Vol mL</th><th>ABV</th><th>Cald</th><th>Col</th><th>Dest</th><th>Refr</th></tr>';fracs.forEach(function(fr){fracRows+='<tr><td>'+(fr.fecha||'—')+'</td><td>'+(fr.hora||'—')+'</td><td>'+(TIPOS[fr.tipo]||fr.tipo)+'</td><td>'+(fr.volumen_ml||'—')+'</td><td>'+(fr.abv||'—')+'%</td><td>'+(fr.tempCaldera||'—')+'</td><td>'+(fr.tempColumna||'—')+'</td><td>'+(fr.tempDestilado||'—')+'</td><td>'+(fr.tempRefrigeracion||'—')+'</td></tr>'+(fr.notasOrganolépticas?'<tr><td colspan="9" style="font-style:italic;color:#666">Organoleptico: '+fr.notasOrganolépticas+'</td></tr>':'')+(fr.anotacionesTecnicas?'<tr><td colspan="9" style="font-style:italic;color:#666">Tecnico: '+fr.anotacionesTecnicas+'</td></tr>':'');});fracRows+='</table>';}var res='<h2>Resumen</h2><table>'+Object.keys(TIPOS).filter(function(t){return tots[t];}).map(function(t){return tr(TIPOS[t],tots[t]+' mL ('+(tots[t]/1000).toFixed(3)+' L)');}).join('')+'</table>';var body='<h1>Destilacion #'+d.numero+'</h1><h2>General</h2><table>'+tr('Fecha',fmtDate(d.fecha))+tr('Hora inicio',d.horaInicio||'—')+'</table>'+res+fracRows+(d.observaciones?'<h2>Observaciones</h2><p>'+d.observaciones+'</p>':'');openPDF('Destilacion #'+d.numero,body);}

function pdfSan(s){var tl={lavado:'Lavado',desinfeccion:'Desinfeccion',ambos:'Lavado + Desinfeccion'};var body='<h1>Saneamiento · BPM INVIMA</h1><h2>General</h2><table>'+tr('Fecha',fmtDate(s.fecha))+tr('Hora',s.hora||'—')+tr('Tipo',tl[s.tipo]||s.tipo)+tr('Equipos',(s.equipos||[]).join(', ')||'—')+(s.responsable?tr('Responsable',s.responsable):'')+'</table>'+((s.tipo==='lavado'||s.tipo==='ambos')&&s.detergente?'<h2>Lavado</h2><table>'+tr('Detergente',s.detergente)+tr('Concentracion',s.concentracionDetergente||'—')+tr('Volumen',(s.volumenDetergente||'—')+' mL')+'</table>':'')+(s.tipo!=='lavado'?'<h2>Desinfeccion</h2><table>'+tr('Desinfectante',s.desinfectante||'—')+tr('Dilucion',s.concentracionDesinfectante||'—')+tr('Volumen',(s.volumenDesinfectante||'—')+' mL')+tr('Tiempo contacto',(s.tiempoContacto_min||'—')+' min')+'</table>':'')+(s.observaciones?'<h2>Observaciones</h2><p>'+s.observaciones+'</p>':'');openPDF('Saneamiento',body);}

// ─── EXCEL ────────────────────────────────────────────────────────────────────
function exportExcel(){if(!window.XLSX){alert('Cargando, intenta en unos segundos.');return;}var wb=XLSX.utils.book_new();var fd=state.F.length?state.F.map(function(f){return{'N':f.numero,'Fecha inicio':fmtDate(f.fechaInicio),'Estado':f.estado,'Panela kg':f.panela_kg,'Agua L':f.volumenAgua,'Levadura g':f.levadura_g,'Tipo levadura':f.levadura_tipo,'Brix inicial':f.brixInicial,'Densidad inicial':f.densidadInicial,'pH inicial':f.phInicial,'pH ajustado':f.phAjustado,'Temp inoculacion':f.tempInoculacion,'Fecha fin':fmtDate(f.fechaFin),'Densidad final':f.densidadFinal,'Brix final':f.brixFinal,'Duracion dias':f.duracionDias,'Fecha traslado':fmtDate(f.fechaTraslado),'Observaciones':f.observaciones};}): [{}];XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(fd),'Fermentaciones');var allFracs=[];state.D.forEach(function(d){(d.fracciones||[]).forEach(function(fr){allFracs.push({'Destilacion N':d.numero,'Fecha dest':fmtDate(d.fecha),'Fecha corte':fr.fecha||'','Hora':fr.hora||'','Tipo':TIPOS[fr.tipo]||fr.tipo,'Volumen mL':fr.volumen_ml,'ABV pct':fr.abv,'Temp caldera':fr.tempCaldera,'Temp columna':fr.tempColumna,'Temp destilado':fr.tempDestilado,'Temp refrig':fr.tempRefrigeracion,'Organoleptico':fr.notasOrganolépticas||'','Tecnico':fr.anotacionesTecnicas||''});});});var dd=state.D.length?state.D.map(function(d){var t={};(d.fracciones||[]).forEach(function(fr){t[fr.tipo]=(t[fr.tipo]||0)+(parseFloat(fr.volumen_ml)||0);});return{'N':d.numero,'Fecha':fmtDate(d.fecha),'Estado':d.estado,'Metanol mL':t.metanol||0,'Cabezas mL':t.cabezas||0,'Corazones mL':t.corazones||0,'Colas mL':t.colas||0,'Observaciones':d.observaciones};}): [{}];XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(dd),'Destilaciones');if(allFracs.length)XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(allFracs),'Cortes detalle');var sd=state.S.length?state.S.map(function(s){return{'Fecha':fmtDate(s.fecha),'Hora':s.hora,'Tipo':s.tipo,'Equipos':(s.equipos||[]).join(', '),'Detergente':s.detergente,'Desinfectante':s.desinfectante,'Responsable':s.responsable,'Observaciones':s.observaciones};}): [{}];XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(sd),'Saneamiento');XLSX.writeFile(wb,'destileria_'+todayFile()+'.xlsx');}

// ─── BACKUP ───────────────────────────────────────────────────────────────────

  var fracCont=document.createElement('div');sec.appendChild(fracCont);
  function renderFracs(){

        if(hasT){var tr2=div('temps-row');[['Cal.',fr.tempCaldera],['Col.',fr.tempColumna],['Dest.',fr.tempDestilado],['Ref.',fr.tempRefrigeracion]].forEach(function(it){if(!it[1])return;var tc=document.createElement('div');tc.className='temp-chip';tc.innerHTML=it[0]+' <span>'+it[1]+'C</span>';tr2.appendChild(tc);});ea.appendChild(tr2);}

  var notasCont=document.createElement('div');sec.appendChild(notasCont);
  function renderNotas(){notasCont.innerHTML='';if(!(d.intervenciones||[]).length)return;notasCont.appendChild(el('h3','','Notas'));d.intervenciones.forEach(function(iv,idx){var ic=div('card');ic.style.padding='8px 12px';ic.style.marginBottom='6px';var ea=document.createElement('div');function showV(){ea.innerHTML='';var hrow=div('card-row');var left=document.createElement('div');left.appendChild(span('muted',(iv.hora||'')+(iv.hora?' · ':'')));left.appendChild(document.createTextNode(iv.descripcion||''));hrow.appendChild(left);var bw=document.createElement('div');bw.style.cssText='display:flex;gap:4px;flex-shrink:0;';bw.appendChild(minibtn('Editar','edit',showE));bw.appendChild(minibtn('Borrar','del',function(){if(confirm('Eliminar nota?')){d.intervenciones=d.intervenciones.filter(function(x,i){return i!==idx;});var arr=state.D.map(function(x){return x.id===d.id?d:x;});saveD(arr);renderNotas();}}));hrow.appendChild(bw);ea.appendChild(hrow);}function showE(){ea.innerHTML='';var ids={h:'eh'+idx,d:'ed'+idx};ea.appendChild(field(ids.h,'Hora','time','',iv.hora));ea.appendChild(field(ids.d,'Descripcion','textarea','',iv.descripcion));var r2=div('btn-row');r2.appendChild(btn('Guardar','btn btn-full',function(){iv.hora=document.getElementById(ids.h).value;iv.descripcion=document.getElementById(ids.d).value;var arr=state.D.map(function(x){return x.id===d.id?d:x;});saveD(arr);showV();}));r2.appendChild(btn('Cancelar','btn-s btn-full',showV));ea.appendChild(r2);}showV();ic.appendChild(ea);notasCont.appendChild(ic);});}

  if(d.observaciones){sec.appendChild(el('h3','','Observaciones'));sec.appendChild(p('card muted',d.observaciones));}

  // Eficiencias calculadas
  (function(){
    var fOrig=state.F.find(function(x){return x.id===d.fermentacionOrigen;});
    if(!fOrig)return;
    var OG=parseFloat(fOrig.densidadInicial);
    var FG=parseFloat(fOrig.densidadFinal);
    var volM=parseFloat(d.volumenMosto_L);
    if(isNaN(OG)||isNaN(FG)||isNaN(volM)||volM<=0)return;
    var abvMosto=(OG-FG)*131.25;
    if(abvMosto<=0)return;
    var etMosto=volM*abvMosto/100;
    var fracs=d.fracciones||[];

    actArea.appendChild(row);
    var bFin=btn('Finalizar destilacion','btn-green',function(){actArea.innerHTML='';var sc=div('sub-card');sc.style.borderColor='#639922';sc.appendChild(el('h3','','Cerrar destilacion'));sc.appendChild(field('cl_ef','Eficiencia (%)','decimal',''));sc.appendChild(field('cl_ob','Observaciones finales','textarea',''));var b2=btn('Finalizar','btn',function(){d.estado='finalizada';d.eficiencia=getVal('cl_ef');d.observaciones=getVal('cl_ob');var arr=state.D.map(function(x){return x.id===d.id?d:x;});saveD(arr);go('destilacion','detail',d);});b2.style.background='#3B6D11';sc.appendChild(b2);sc.appendChild(btn('Cancelar','btn-s',renderActs));actArea.appendChild(sc);});

  return sec;
}

// ─── RENDER PRINCIPAL ─────────────────────────────────────────────────────────
function render(){
  var app=document.getElementById('app');app.innerHTML='';
  var hdr=document.createElement('div');hdr.className='hdr';
  var showBack=state.view!=='list'&&state.tab!=='dashboard'&&state.tab!=='datos';
  if(showBack){var bb=document.createElement('button');bb.className='hdr-back';bb.textContent='<';bb.addEventListener('click',function(){state.view='list';state.sel=null;render();});hdr.appendChild(bb);}
  var ht=document.createElement('div');var titles={dashboard:'Destileria',fermentacion:'Fermentacion',destilacion:'Destilacion',saneamiento:'Saneamiento',datos:'Datos'};var t1=el('div','hdr-title',titles[state.tab]);var t2=el('div','hdr-sub','Ron de panela · Subachoque');ht.appendChild(t1);ht.appendChild(t2);hdr.appendChild(ht);
  var dot=span('sync-dot','●');dot.id='sync-dot';dot.style.color='#639922';dot.title='Sincronizado';hdr.appendChild(dot);
  app.appendChild(hdr);
  var views={
    'dashboard:list':renderDashboard,'fermentacion:list':renderFermList,'fermentacion:form':renderFermForm,'fermentacion:detail':renderFermDetail,
    'destilacion:list':renderDestList,'destilacion:form':renderDestForm,'destilacion:detail':renderDestDetail,
    'saneamiento:list':renderSanList,'saneamiento:form':renderSanForm,'saneamiento:detail':renderSanDetail,'datos:list':renderDatos
  };
  var fn=views[state.tab+':'+state.view];if(fn)app.appendChild(fn());
  var nav=document.createElement('nav');nav.className='nav';
  [['dashboard','\u2302','Inicio'],['fermentacion','\u26a7','Ferment.'],['destilacion','\u2b21','Destil.'],['saneamiento','\u2713','Saneam.'],['datos','\u2601','Datos']].forEach(function(t){var b=document.createElement('button');b.className='nav-btn'+(state.tab===t[0]?' active':'');var ic=el('span','nav-icon',t[1]);var lb=document.createElement('span');lb.textContent=t[2];b.appendChild(ic);b.appendChild(lb);b.addEventListener('click',function(){state.tab=t[0];state.view='list';state.sel=null;render();});nav.appendChild(b);});
  app.appendChild(nav);
}
